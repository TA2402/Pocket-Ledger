name: Unzip App Files
on: {workflow_dispatch: {}}
permissions: {contents: write}
jobs: {unzip: {runs-on: ubuntu-latest, steps: [{uses: "actions/checkout@v4"}, {name: "Unzip archive", run: "unzip -o pocket-ledger-github-pages-v2.zip -d ."}, {name: "Commit extracted files", run: "git config user.name \"github-actions[bot]\"\ngit config user.email \"github-actions[bot]@users.noreply.github.com\"\ngit add -A\ngit commit -m \"Extract app files from zip\" || echo \"Nothing to commit\"\ngit push"}]}}
